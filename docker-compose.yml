services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bbscoreboard
      POSTGRES_USER: bbadmin
      POSTGRES_PASSWORD: bbscoreboard_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build:
      context: ./src
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - Database__Provider=postgres
      - ConnectionStrings__Postgres=Host=db;Database=bbscoreboard;Username=bbadmin;Password=bbscoreboard_pass
      - DefaultUserEmail=admin@bbscoreboard.local
      - DefaultPassword=Admin123!

volumes:
  pgdata:
